<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hani Perfume | هانی پرفیوم</title>

    <style>
        body {
            margin: 0;
            font-family: 'IRANSans', sans-serif;
            background: #d8c5ac;
            color: #2b2520;
        }

        header {
            padding: 20px 40px;
            background: #2f221c;
            color: #f2c27b;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .hero {
            padding: 60px 20px;
            text-align: center;
            background: linear-gradient(180deg, #e8d7c3, #c7ad92);
        }

        .hero h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 16px;
            opacity: 0.8;
        }

        .gallery {
            max-width: 1100px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 25px;
            padding: 0 20px;
        }

        .item {
            position: relative;
            overflow: hidden;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            cursor: pointer;
            transition: transform 0.4s ease;
        }

        .item:hover {
            transform: scale(1.04);
        }

        .item img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.55), transparent);
            opacity: 0;
            transition: 0.3s ease;
        }

        .item:hover .overlay {
            opacity: 1;
        }

        .overlay-text {
            position: absolute;
            bottom: 12px;
            right: 12px;
            color: #fff;
            font-size: 14px;
        }

        footer {
            margin-top: 60px;
            background: #2f221c;
            color: #f2c27b;
            text-align: center;
            padding: 25px 10px;
            font-size: 14px;
        }

        footer a {
            color: #f2c27b;
            font-weight: bold;
        }
    </style>
</head>
